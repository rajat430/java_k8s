name: validate_pr
on:
  pull_request:
    branches: [dev,main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: docker build
        run: |
          docker build -t my-java-app:${{github.sha}} .
      - name: docker tag
        run: |
          docker tag my-java-app:${{github.sha}} ${{ secrets.DOCKER_USERNAME }}/my-java-app:${{github.sha}}
      - name: docker_push
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin          
          docker push ${{ secrets.DOCKER_USERNAME }}/my-java-app:${{github.sha}}
          